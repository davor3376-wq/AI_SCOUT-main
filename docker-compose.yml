version: "3.9"

services:
  # ── Application ─────────────────────────────────────────────────────────────
  scout:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://scout:${POSTGRES_PASSWORD}@db:5432/scout"
      ENVIRONMENT: production
    volumes:
      - scout_data:/app/data
      - scout_results:/app/results
      - scout_reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scout
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout -d scout"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx (HTTPS termination + HTTP→HTTPS redirect) ─────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - scout
    restart: unless-stopped

volumes:
  scout_data:
  scout_results:
  scout_reports:
  pgdata:
