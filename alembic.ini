# Alembic configuration for AI SCOUT
# Run migrations: alembic upgrade head
# Generate new migration: alembic revision --autogenerate -m "description"

[alembic]
# Path to the migration scripts directory
script_location = alembic

# SQLAlchemy URL — overridden at runtime by alembic/env.py from env vars.
# For SQLite the value below is the fallback; for PostgreSQL set DATABASE_URL.
sqlalchemy.url = sqlite:///jobs.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
