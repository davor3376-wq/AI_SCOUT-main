name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/ tests/ --select E,W,F,I --ignore E501

  # ── Unit & integration tests ────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      # Use in-memory / temp SQLite so tests never touch real data
      SCOUT_DB_PATH: ":memory:"
      SCOUT_SECRET_KEY: "ci-test-secret-key-at-least-32-chars-long"
      SCOUT_ADMIN_USERNAME: "admin"
      SCOUT_ADMIN_PASSWORD: "AdminPass1!"
      LOG_LEVEL: "WARNING"
      # Disable Sentinel Hub so catalog tests are skipped gracefully
      SH_CLIENT_ID: ""
      SH_CLIENT_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (GDAL / rasterio)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin libproj-dev libgeos-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/omni_genesis.txt
          pip install pytest pytest-asyncio httpx alembic

      - name: Run Alembic migrations (smoke test)
        run: |
          export SCOUT_DB_PATH=ci_test.db
          alembic upgrade head
          rm -f ci_test.db

      - name: Run test suite
        run: |
          pytest tests/ \
            --ignore=tests/test_pipeline_integration.py \
            --ignore=tests/test_ingestion_omni.py \
            -v --tb=short -q

      - name: Run integration tests
        run: |
          pytest tests/test_integration.py -v --tb=short

  # ── Alembic migration check ─────────────────────────────────────────────────
  migrations:
    name: Alembic migration check
    runs-on: ubuntu-latest
    env:
      SCOUT_DB_PATH: "alembic_ci.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install alembic sqlalchemy python-dotenv

      - name: Upgrade to head
        run: alembic upgrade head

      - name: Verify current == head
        run: |
          CURRENT=$(alembic current 2>&1)
          echo "$CURRENT"
          echo "$CURRENT" | grep -q "(head)" || (echo "Migration not at head!" && exit 1)

      - name: Downgrade to base
        run: alembic downgrade base

      - name: Upgrade again (idempotency check)
        run: alembic upgrade head
